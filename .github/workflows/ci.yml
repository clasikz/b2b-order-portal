name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    # The Prisma client is generated on install (postinstall). `prisma generate` only reads the
    # schema and never connects, but the datasource block references these env vars, so we give
    # it harmless placeholders. The unit tests are pure logic and touch no database.
    env:
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
      DIRECT_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run
